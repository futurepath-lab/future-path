name: Deploy Future Career Site

on:
  push:
    branches:
      - main
    paths:
      - "future-career-site/**"
      - ".github/workflows/deploy-future-career-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: future-career-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate data
        run: npm run validate:data

      - name: Build data bundle
        run: npm run build:data

      - name: Build catalog preview
        run: npm run build:preview

      - name: Audit deploy files
        run: npm run audit:deploy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: future-career-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
